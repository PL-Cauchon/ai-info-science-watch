name: Daily Article Fetch

on:
  schedule:
    # 7:00 UTC every day = 3am ET / midnight PT
    - cron: '0 7 * * *'
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Fetch new articles
        run: python scripts/fetch_articles.py

      - name: Generate static site
        run: python scripts/generate_site.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json index.html
          git diff --staged --quiet || git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
          git push
